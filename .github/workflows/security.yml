name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC to catch newly disclosed CVEs
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write  # required to upload SARIF to GitHub Security tab

jobs:
  # ── 1. Dependency audit ──────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Gate on production dependencies only — these are the ones consumers
      # inherit when they install the package. devDependencies (vitest,
      # Storybook, etc.) never ship, so their advisories shouldn't block a
      # release. Review dev-tooling advisories separately via a local
      # `pnpm audit` rather than failing CI on them.
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=moderate

  # ── 2. Static analysis (Semgrep) ────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/xss \
            --config p/secrets \
            --sarif \
            --output semgrep.sarif \
            src/
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # ── 3. CodeQL ───────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  # ── 4. Supply chain — pinned lockfile check ──────────────────────────────────
  lockfile:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Verify lockfile is up to date
        run: pnpm install --frozen-lockfile
