name: Bug Report
description: Something is not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search [existing issues](https://github.com/apollosuny/react-truncate/issues) to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        Minimal code that reproduces the issue. A CodeSandbox or StackBlitz link is ideal.
        Without a reproduction, the issue may be closed.
      placeholder: |
        <Truncate lines={3}>
          <Truncate.Content>{text}</Truncate.Content>
          <Truncate.Toggle>...</Truncate.Toggle>
        </Truncate>
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, React version, browser, OS
      placeholder: |
        - Node: 20.x
        - React: 19.1.0
        - Browser: Chrome 124
        - OS: macOS 14
    validations:
      required: true
