name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Please search [existing issues](https://github.com/apollosuny/react-truncate/issues) first.
        For breaking API changes, open a discussion instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What is the current limitation?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What API or behaviour change would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you found workarounds or other approaches?
